x-app: &app
  build:
    context: .
  image: ${COMPOSE_PROJECT_NAME:-flusso}-app
  restart: unless-stopped
  env_file: .env
  volumes:
    - .:/var/www
    - vendor:/var/www/vendor
    - node_modules:/var/www/node_modules
    - storage:/var/www/storage
  networks:
    - app-network

services:
  app:
    <<: *app
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://web:80/up || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  web:
    <<: *app
    entrypoint: ['/web-entrypoint.sh']
    ports:
      - '${APP_PORT:-80}:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/http.d/default.conf:ro
      - .:/var/www
      - vendor:/var/www/vendor
      - node_modules:/var/www/node_modules
      - storage:/var/www/storage
    depends_on:
      - app

  scheduler:
    <<: *app
    entrypoint: ['/scheduler-entrypoint.sh']
    depends_on:
      - app

  queue:
    <<: *app
    entrypoint: ['/queue-entrypoint.sh']
    depends_on:
      - app

volumes:
  vendor:
  node_modules:
  storage:

networks:
  app-network:
    driver: bridge

x-app: &app
  build: { context: ., target: app }
  restart: unless-stopped
  env_file: .env
  init: true
  networks: [app]
  volumes:
    - ./database/database.sqlite:/var/www/database/database.sqlite

services:
  web:
    <<: *app
    ports: ['${APP_PORT:-80}:80']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/up']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  scheduler:
    <<: *app
    command: [php, artisan, schedule:work, --no-interaction]
    depends_on:
      web: { condition: service_healthy }

  queue:
    <<: *app
    command: [php, artisan, queue:work, --sleep=3, --tries=3, --timeout=3600, --no-interaction]
    depends_on:
      web: { condition: service_healthy }

networks:
  app:
